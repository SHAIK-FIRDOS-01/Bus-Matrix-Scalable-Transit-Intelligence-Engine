{% extends 'myapp/base.html' %}
{% block content %}
<div class="card fade-in" style="max-width: 500px; margin: 0 auto;">
    <h2 class="text-center">Create an account</h2>
    <p class="text-center text-muted" style="margin-bottom: 2rem;">Join ABC Transit today for quick and easy bookings.</p>
    
    {% if error %}
    <div class="alert alert-danger">{{error}}</div>
    {% endif %}

    <form action="{% url 'signup' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="email">Email Address</label>
            <input name='email' class="form-control" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="name">Username</label>
            <input name='name' class="form-control" type="text" id="name" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input name='password' class="form-control" type="password" id="password" placeholder="Create a strong password" required>
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 1rem;">Sign Up</button>
    </form>
</div>
{% endblock %}
