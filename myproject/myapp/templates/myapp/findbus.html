{% extends 'myapp/base.html' %}
{% block content %}
<div class="card fade-in" style="max-width: 600px; margin: 0 auto;">
    <h2 class="text-center" style="margin-bottom: 2rem;">Find Your Bus</h2>
    
    {% if error %}
    <div class="alert alert-danger">{{error}}</div>
    {% endif %}

    <form action="{% url 'findbus' %}" method="post">
        {% csrf_token %}
        
        <datalist id="cityList">
            <!-- Coastal Artery -->
            <option value="Visakhapatnam"></option><option value="Rajahmundry"></option><option value="Eluru"></option>
            <option value="Vijayawada"></option><option value="Guntur"></option><option value="Ongole"></option>
            <option value="Nellore"></option><option value="Tirupati"></option>
            <!-- Rayalaseema Extension -->
            <option value="Hyderabad"></option><option value="Mahabubnagar"></option><option value="Kurnool"></option>
            <option value="Anantapur"></option><option value="Kadapa"></option>
            <!-- Central Corridors -->
            <option value="Suryapet"></option><option value="Khammam"></option><option value="Machilipatnam"></option>
            <!-- Godavari Belt -->
            <option value="Warangal"></option><option value="Kothagudem"></option><option value="Bhadrachalam"></option>
            <!-- Northern Block -->
            <option value="Siddipet"></option><option value="Karimnagar"></option><option value="Ramagundam"></option>
            <option value="Mancherial"></option>
        </datalist>

        <div class="form-group">
            <label for="source">From</label>
            <input name="source" id="source" class="form-control" list="cityList" placeholder="Start typing departure city..." autocomplete="off" required>
        </div>
        <div class="form-group">
            <label for="destination">Destination</label>
            <input name="destination" id="destination" class="form-control" list="cityList" placeholder="Start typing arrival city..." autocomplete="off" required>
        </div>
        <div class="form-group">
            <label for="date">Travel Date <span class="text-muted">(Optional)</span></label>
            <input name='date' class="form-control" type="date" id="date">
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 1.5rem;">Search Buses</button>
    </form>
</div>
{% endblock %}
