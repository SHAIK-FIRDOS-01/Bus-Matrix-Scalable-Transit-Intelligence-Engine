{% extends 'myapp/base.html' %}
{% block content %}
<div class="card fade-in" style="max-width: 500px; margin: 0 auto;">
    <h2 class="text-center">Log in to your account</h2>
    <p class="text-center text-muted" style="margin-bottom: 2rem;">Welcome back! Please enter your details.</p>
    
    {% if error %}
    <div class="alert alert-danger">{{error}}</div>
    {% endif %}

    <form action="{% url 'signin' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Username</label>
            <input name='name' class="form-control" type="text" id="name" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input name='password' class="form-control" type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Sign In</button>
    </form>
</div>
{% endblock %}
