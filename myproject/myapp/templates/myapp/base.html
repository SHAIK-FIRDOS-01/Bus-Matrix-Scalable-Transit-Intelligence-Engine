<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <title>ABC Transit</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-color: #0f172a; /* Sleek dark accent for buttons */
            --accent-hover: #334155;
            --brand-color: #2563eb; /* Blue highlight */
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Navbar */
        .navbar {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 9999;
        }
        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.025em;
        }
        .navbar-brand svg { color: var(--brand-color); }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }
        .nav-link:hover, .nav-link.active { color: var(--text-primary); }
        .nav-btn {
            background-color: var(--accent-color);
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px; /* Pill shape */
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .nav-btn:hover { background-color: var(--accent-hover); color: white; transform: translateY(-1px); box-shadow: var(--shadow-md); }

        /* Main Content Container */
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
            flex-grow: 1;
        }
        
        /* Card UI */
        .card {
            background: var(--surface-color);
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { box-shadow: var(--shadow-lg); }

        /* Basic Layout Classes mapping roughly to Bootstrap */
        .row { display: flex; flex-wrap: wrap; margin: -1rem; }
        .col-md-6 { padding: 1rem; width: 50%; }
        .col-md-12 { padding: 1rem; width: 100%; }
        @media (max-width: 768px) { .col-md-6 { width: 100%; } }
        
        .mt-4 { margin-top: 1.5rem; }
        .mb-4 { margin-bottom: 1.5rem; }

        /* Forms & Buttons */
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            color: var(--text-primary);
            background-color: #f8fafc;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--brand-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .btn {
            display: inline-block;
            background-color: var(--brand-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            width: auto;
            min-width: 120px;
        }
        .btn:hover { background-color: #1d4ed8; box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .btn-success { background-color: var(--accent-color); }
        .btn-success:hover { background-color: var(--accent-hover); }
        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }
        
        /* Typography */
        h1, h2, h3 { color: var(--text-primary); margin-bottom: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
        .text-center { text-align: center; }
        .text-muted { color: var(--text-secondary); }
        
        /* Table styles */
        .table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 1.5rem; }
        .table th, .table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .table th { font-weight: 600; color: var(--text-secondary); background: var(--bg-color); border-bottom: 2px solid var(--border-color); }
        .table tr:last-child td { border-bottom: none; }
        
        /* Alerts */
        .alert { padding: 1rem 1.25rem; border-radius: 0.5rem; margin-bottom: 1.5rem; font-weight: 500; }
        .alert-danger { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="{% url 'home' %}">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            ABC Transit
        </a>
        <div class="nav-links">
            <a class="nav-link" href="{% url 'home' %}">Home</a>
            <a class="nav-link" href="{% url 'findbus' %}">Find Bus</a>
            <a class="nav-link" href="{% url 'seebookings' %}">See Bookings</a>
            {% if request.user.is_active %}
                <a class="nav-link nav-btn" href="{% url 'signout' %}">Sign out</a>
            {% else %}
                <a class="nav-link" href="{% url 'signin' %}">Sign In</a>
                <a class="nav-link nav-btn" href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <main class="container fade-in">
        {% block content %}
        {% endblock %}
    </main>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</body>
</html>
